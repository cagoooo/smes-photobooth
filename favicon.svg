<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#fff7ec" stroke="#e08a3c" stroke-width="16"/>
  <!-- Fish Tail on the left side of the camera -->
  <path d="M 130 256 L 70 200 C 60 190, 50 210, 50 256 C 50 302, 60 322, 70 312 Z" fill="#e08a3c" stroke="#3a2a18" stroke-width="16" stroke-linejoin="round"/>
  <path d="M 110 256 L 60 220 C 55 240, 55 272, 60 292 Z" fill="#ffe7d0"/>
  <!-- Camera Body -->
  <path d="M 160 200 L 190 150 C 195 142, 205 140, 215 140 L 297 140 C 307 140, 317 142, 322 150 L 352 200 L 410 200 C 430 200, 440 210, 440 230 L 440 370 C 440 390, 430 400, 410 400 L 160 400 C 140 400, 130 390, 130 370 L 130 230 C 130 210, 140 200, 160 200 Z" fill="#3a2a18" stroke="#3a2a18" stroke-width="8" stroke-linejoin="round"/>
  <!-- Camera Flash/Red Light -->
  <circle cx="180" cy="240" r="16" fill="#d2553f"/>
  <!-- Fish Fin on Top of Camera -->
  <path d="M 230 140 Q 256 70 300 140 Z" fill="#e08a3c" stroke="#3a2a18" stroke-width="12" stroke-linejoin="round"/>
  <!-- Big Lens / Fish Eye representation -->
  <circle cx="286" cy="300" r="85" fill="#e08a3c" stroke="#fff" stroke-width="12"/>
  <circle cx="286" cy="300" r="60" fill="#1f8fa6" stroke="#3a2a18" stroke-width="12"/>
  <!-- Lens reflection -->
  <circle cx="266" cy="280" r="16" fill="#fff"/>
  <circle cx="296" cy="310" r="6" fill="#fff"/>
  <!-- Cute Fish Smile at the side of the lens -->
  <path d="M 370 280 Q 390 295 380 310" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Little Bubbles -->
  <circle cx="410" cy="140" r="14" fill="none" stroke="#1f8fa6" stroke-width="6"/>
  <circle cx="435" cy="100" r="8" fill="none" stroke="#1f8fa6" stroke-width="4"/>
</svg>
